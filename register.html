<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="profile">
        <img
          src="Photo/Uinum.jpg"
          alt="Profile Picture"
          class="Profile-Picture"
        />
      </div>

      <h1 class="Register">Register</h1>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
      </nav>
      <div class="search">
        <form>
          <input type="text" placeholder="search.." />
          <button type="button">GO</button>
        </form>
      </div>
    </header>
    <br />

    <form class="register-form" action="index.html" method="get">
      <label for="firstName">First Name</label>
      <input
        id="firstName"
        type="text"
        placeholder="e.g Myles"
        style="margin-bottom: 20"
        required
      /><br /><br />

      <label for="lastName">Last Name</label>
      <input
        id="lastName"
        type="text"
        placeholder="e.g Wambua"
        style="margin-bottom: 20"
      /><br /><br />

      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="Username"
        placeholder="e,g Nzukimyles"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="email">Email</label>
      <input
        id="email"
        name="Email"
        placeholder="e.g nzukimyles89@gmail.com"
        style="margin-bottom: 20px"
      /><br /><br />

      <label for="phoneNumber">Phone Number</label>
      <input
        id="phoneNumber"
        type="tel"
        name="Phone number"
        placeholder="e.g +254 736898045"
        pattern="[+]{1}[0-9]{10,15}"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="age">Age</label>
      <input
        id="age"
        type="number"
        name="Age"
        min="15"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="Password"
        placeholder="********"
        required
      /><br /><br />

      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="********"
        style="margin-bottom: 20"
      /><br /><br />

      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
    <br />
    <footer>
      <p>&copy; 2026 Nzuki Myles. All rights reserved.</p>
      <a href="mailto:nzukimyles89@gmail.com">Contact Me.</a>
    </footer>
  </body>
</html>
