<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" initial-scale="1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      ul {
        list-style-type: none;
        display: flex;
        padding: 0px;
        margin: 0px;
        gap: 15px;
      }
      body {
        background-color: aqua;
      }
      form {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid blueviolet;
        border-radius: 6px;
        font-family: "Times New Roman", Times, serif;
        background-color: blue;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid wheat;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background-color: blueviolet;
        color: beige;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        padding: 12px 20px;
      }
      button:hover {
        background-color: black;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: orange;
        padding: 8px;
        color: blueviolet;
        border-radius: 13px;
      }
      p {
        font-family: "Times New Roman", Times, serif;
        font-size: 28px;
        font-style: italic;
      }
    </style>
    <header>
      <h1>Register</h1>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
      </nav>
    </header>
    <br />

    <form action="index.html" method="get">
      <label for="firstName">First Name</label>
      <input
        id="firstName"
        type="text"
        placeholder="e.g Myles"
        style="margin-bottom: 20"
        required
      /><br /><br />

      <label for="lastName">Last Name</label>
      <input
        id="lastName"
        type="text"
        placeholder="e.g Wambua"
        style="margin-bottom: 20"
      /><br /><br />

      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="Username"
        placeholder="e,g Nzukimyles"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="email">Email</label>
      <input
        id="email"
        name="Email"
        placeholder="e.g nzukimyles89@gmail.com"
        style="margin-bottom: 20px"
      /><br /><br />

      <label for="phoneNumber">Phone Number</label>
      <input
        id="phoneNumber"
        type="tel"
        name="Phone number"
        placeholder="e.g +254 736898045"
        pattern="[+]{1}[0-9]{10,15}"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="age">Age</label>
      <input
        id="age"
        type="number"
        name="Age"
        min="15"
        style="margin-bottom: 20px"
        required
      /><br /><br />

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="Password"
        placeholder="********"
        required
      /><br /><br />

      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="********"
        style="margin-bottom: 20"
      /><br /><br />

      <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </body>
</html>
