<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" , initial-scale="1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <style>
      header {
        justify-content: space-between;
        display: flex;
        align-items: center;
        background-color: chocolate;
        padding: 6px;
        color: black;
        border-radius: 15px;
      }
      header .profile img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
      }
      h1 {
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
        font-style: italic;
        font-size: 40px;
      }
      nav ul li a {
        text-decoration: none;
        color: darkblue;
      }
      nav ul li {
        margin-left: 15px;
      }
      nav ul li a:hover {
        text-decoration: underline;
      }
      form {
        max-width: 200px;
        margin: 0;
        border-radius: 8px;
        padding: 15px;
        background-color: chocolate;
        border: 1px solid blue;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        border-radius: 4px;
        padding: 7px;
        margin-bottom: 15px;
        border: 1px solid blueviolet;
        box-sizing: border-box;
      }
      button {
        background-color: blueviolet;
        border: none;
        cursor: pointer;
        color: aquamarine;
        padding: 4px;
      }
      button:hover {
        background-color: black;
      }
      ul {
        list-style-type: none;
        display: flex;
        margin: 0;
        padding: 0;
        gap: 20px;
      }
      p {
        font-family: Georgia, "Times New Roman", Times, serif;
        font-size: 22px;
        font-style: italic;
      }
      body {
        background-color: aqua;
      }
      footer {
        font-family: "Times New Roman", Times, serif;
        font-style: italic;
        align-items: center;
        display: flex;
        padding: 6px;
        background-color: chocolate;
        border-radius: 15px;
      }
      .search form {
        display: flex;
        align-items: center;
      }
      .search input {
        padding: 2px;
        border: 1px solid yellow;
        border-radius: 20px;
      }
      .search button {
        padding: 5px 10px;
        border: none;
        margin-left: 3px;
        border-radius: 15px;
        background-color: blueviolet;
        cursor: pointer;
        color: white;
      }
      .search button:hover {
        background-color: black;
      }
      .search form {
        display: flex;
        align-items: center;
        background-color: blue;
      }
      .search input {
        padding: 5px;
        border-radius: 10px;
        border: 1px solid#ccc;
      }
    </style>
    <header>
      <div class="profile">
        <img
          src="Photo/Uinum.jpg"
          alt="Profile Picture"
          class="profile picture"
        />
      </div>
      <h1 class="title">Login</h1>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="register.html">Register</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
        </ul>
      </nav>
      <div class="search">
        <form>
          <input type="text" placeholder="search..." />
          <button type="button">Search</button>
        </form>
      </div>
    </header>
    <br /><br />

    <form action="dashboard.html" method="get">
      <label for="userName">Username</label>
      <input id="userName" type="text" name="Username" required /><br /><br />

      <label for="passWord">Password</label>
      <input
        id="passWord"
        type="password"
        name="password"
        required
      /><br /><br />
      <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="register.html">Register here</a></p>
    <br />
    <footer>
      <p>&copy; 2026 Nzuki Myles. All rights reserved.</p>
      <a href="mailto:nzukimyles89@gmail.com">Contact Me.</a>
    </footer>
  </body>
</html>
